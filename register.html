<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - База знаний</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-flex">
                <div class="logo-area">
                    <h1>🛡️ База знаний по кибербезопасности</h1>
                    <p>Защити свой бизнес от киберугроз — просто и понятно</p>
                </div>
                <div class="profile-area">
                    <a href="profile.html" class="profile-header-btn">👤 Войти</a>
                </div>
            </div>
        </div>
    </header>

    <nav>
        <div class="container">
            <a href="index.html">🏠 Главная</a>
            <a href="articles.html">📚 База знаний</a>
            <a href="test.html">📝 Тесты</a>
        </div>
    </nav>

    <main class="container">
        <div class="auth-container">
            <div class="auth-card">
                <h2>📝 Регистрация</h2>
                <input type="text" id="reg-username" placeholder="Имя пользователя" class="auth-input">
                <input type="email" id="reg-email" placeholder="Email" class="auth-input">
                <input type="password" id="reg-password" placeholder="Пароль" class="auth-input">
                <input type="password" id="reg-password2" placeholder="Повторите пароль" class="auth-input">
                <button onclick="doRegister()" class="auth-btn">Зарегистрироваться</button>
                <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
                <div id="reg-error" class="error-message"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 База знаний по кибербезопасности | Учебный проект</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
